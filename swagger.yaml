openapi: 3.0.3
info:
  title: BackendLab API — Clerkiva Edition
  description: |
    ## BackendLab — Clerkiva Edition

    ### Clerkiva (patrones reales implementados correctamente)
    Los mismos patrones que usa Clerkiva en producción, pero aplicados bien:
    `@Exclude` en password, ValidationPipe en DTOs, RolesGuard con los 4 roles reales.

    **Quick Start:**
    1. `POST /clerkiva/auth/login` con `{ "userID": "admin", "password": "admin123" }`
    2. Copiá el token → **Authorize** → pegalo como Bearer
    3. Usuarios disponibles: admin/admin123 (ADMIN), cajero01/cajero123 (CAJERO), consulta/consulta123 (CONSULTA), deposito/deposito123 (DEPOSITO)

    ### Lab Clerkiva (funciones que Clerkiva no tiene)
    Rate limiting, SSE en tiempo real, Cron jobs automáticos, Health check.

    **Quick Start SSE:**
    ```
    curl -N http://localhost:3000/lab-clerkiva/caja/eventos
    # En otra terminal:
    curl -X POST http://localhost:3000/lab-clerkiva/caja/venta \
      -H "Content-Type: application/json" \
      -d '{"usuario":"cajero01","total":5000,"medioDePago":"efectivo"}'
    ```

  version: 2.0.0

servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo local

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido desde POST /clerkiva/auth/login

  schemas:

    # ─── Comunes ──────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 404
        message:
          type: string
          example: "Recurso no encontrado"
        error:
          type: string
          example: "Not Found"

    ValidationErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: array
          items:
            type: string
          example: ["lineasVenta must contain at least 1 elements", "medioDePago must be a valid enum value"]
        error:
          type: string
          example: "Bad Request"

    # ─── Clerkiva – Auth ──────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required:
        - userID
        - password
      properties:
        userID:
          type: string
          example: "admin"
          description: Nombre de usuario (campo userID, mismo que Clerkiva real)
        password:
          type: string
          example: "admin123"
          minLength: 6

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UserResponse:
      type: object
      description: |
        Respuesta del usuario actual. password y token están EXCLUIDOS gracias a @Exclude()
        en UserEntity. En Clerkiva real, estos campos viajan en la respuesta.
      properties:
        id:
          type: integer
          example: 1
        usuario:
          type: string
          example: "admin"
        nombres:
          type: string
          example: "Federico"
        apellidos:
          type: string
          example: "Admin"
        rol:
          type: string
          enum: [ADMIN, CAJERO, CONSULTA, DEPOSITO]
          example: "ADMIN"
        sucursal:
          type: string
          example: "Central"

    # ─── Clerkiva – Ventas ────────────────────────────────────────────────────

    LineaVentaRequest:
      type: object
      required:
        - productoId
        - descripcion
        - cantidad
        - precioUnitario
      properties:
        productoId:
          type: integer
          minimum: 1
          example: 1
        descripcion:
          type: string
          example: "Yerba Mate 1kg"
        cantidad:
          type: integer
          minimum: 1
          example: 2
        precioUnitario:
          type: number
          minimum: 0.01
          example: 1500

    CreateVentaRequest:
      type: object
      required:
        - lineasVenta
        - medioDePago
      properties:
        lineasVenta:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineaVentaRequest'
        medioDePago:
          type: string
          enum: [efectivo, tarjeta, transferencia]
          example: "efectivo"

    LineaVentaResponse:
      type: object
      properties:
        productoId:
          type: integer
          example: 1
        descripcion:
          type: string
          example: "Yerba Mate 1kg"
        cantidad:
          type: integer
          example: 2
        precioUnitario:
          type: number
          example: 1500
        subtotal:
          type: number
          example: 3000

    VentaResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fecha:
          type: string
          format: date-time
          example: "2026-06-17T20:00:00.000Z"
        usuario:
          type: string
          example: "cajero01"
        lineasVenta:
          type: array
          items:
            $ref: '#/components/schemas/LineaVentaResponse'
        medioDePago:
          type: string
          enum: [efectivo, tarjeta, transferencia]
          example: "efectivo"
        total:
          type: number
          example: 3000

    # ─── Clerkiva – Cajas ─────────────────────────────────────────────────────

    AperturaCajaRequest:
      type: object
      required:
        - saldoInicial
      properties:
        saldoInicial:
          type: number
          minimum: 0
          example: 5000

    CreateMovimientoRequest:
      type: object
      required:
        - tipo
        - monto
        - descripcion
      properties:
        tipo:
          type: string
          enum: [ingreso, egreso]
          example: "ingreso"
        monto:
          type: number
          minimum: 0.01
          example: 2000
        descripcion:
          type: string
          example: "Venta en efectivo #1"

    CierreCajaRequest:
      type: object
      required:
        - saldoFinal
      properties:
        saldoFinal:
          type: number
          minimum: 0
          example: 8500

    SesionCajaResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        abiertaEn:
          type: string
          format: date-time
        saldoInicial:
          type: number
          example: 5000
        movimientos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              tipo:
                type: string
                enum: [ingreso, egreso]
              monto:
                type: number
              descripcion:
                type: string
              timestamp:
                type: string
                format: date-time
        cerradaEn:
          type: string
          format: date-time
          nullable: true
        saldoFinal:
          type: number
          nullable: true
          example: 8500
        diferencia:
          type: number
          nullable: true
          description: "saldoFinal - (saldoInicial + ingresos - egresos). Negativo = faltante."
          example: 500
        abierta:
          type: boolean
          example: true

    # ─── Clerkiva – Reportes ──────────────────────────────────────────────────

    EmpleadoRankingItem:
      type: object
      properties:
        usuario:
          type: string
          example: "cajero01"
        cantVentas:
          type: integer
          example: 12
        totalVendido:
          type: number
          example: 48000

    ResumenDiarioResponse:
      type: object
      properties:
        fecha:
          type: string
          example: "2026-06-17"
        cantidadVentas:
          type: integer
          example: 15
        totalVendido:
          type: number
          example: 75000
        porMedioDePago:
          type: object
          example:
            efectivo: 30000
            tarjeta: 40000
            transferencia: 5000

    # ─── Lab Clerkiva ─────────────────────────────────────────────────────────

    NuevaVentaRequest:
      type: object
      required:
        - usuario
        - total
        - medioDePago
      properties:
        usuario:
          type: string
          example: "cajero01"
        total:
          type: number
          minimum: 0.01
          example: 5000
        medioDePago:
          type: string
          enum: [efectivo, tarjeta, transferencia]
          example: "efectivo"

    EventoVentaSSE:
      type: object
      description: Evento emitido a través del stream SSE cuando se registra una venta
      properties:
        id:
          type: integer
          example: 1
        usuario:
          type: string
          example: "cajero01"
        total:
          type: number
          example: 5000
        medioDePago:
          type: string
          example: "efectivo"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-17T20:30:00.000Z"

    SaludResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        uptime:
          type: object
          properties:
            segundos:
              type: integer
              example: 3600
            legible:
              type: string
              example: "1h 0m 0s"
        memoria:
          type: object
          properties:
            usada:
              type: string
              example: "95 MB"
            total:
              type: string
              example: "120 MB"
            porcentaje:
              type: string
              example: "79%"
        proceso:
          type: object
          properties:
            nodeVersion:
              type: string
              example: "v22.5.0"
            pid:
              type: integer
              example: 12345
            plataforma:
              type: string
              example: "darwin"
        timestamp:
          type: string
          format: date-time

    LogEntryResponse:
      type: object
      properties:
        tarea:
          type: string
          example: "Chequeo Stock Mínimo"
        ejecutadaEn:
          type: string
          format: date-time
        resultado:
          type: string
          example: "Todos los productos sobre el mínimo"

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # CLERKIVA — Auth
  # ═══════════════════════════════════════════════════════════════════════════

  /clerkiva/auth/login:
    post:
      tags:
        - Clerkiva – Auth
      summary: Login (JWT)
      description: |
        Mismo patrón que Clerkiva real: `userID` + `password` → JWT con `{id, rol}`.

        **Usuarios disponibles:**
        | usuario | password | rol |
        |---------|----------|-----|
        | admin | admin123 | ADMIN |
        | cajero01 | cajero123 | CAJERO |
        | consulta | consulta123 | CONSULTA |
        | deposito | deposito123 | DEPOSITO |
      operationId: clerkivaLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "201":
          description: Login exitoso — copiá el token y usá Authorize
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clerkiva/auth/me:
    get:
      tags:
        - Clerkiva – Auth
      summary: Usuario actual (password excluida)
      description: |
        Devuelve el usuario del token. **password** y **token** NO aparecen en la respuesta
        gracias a `@Exclude()` en `UserEntity`.

        En Clerkiva real, el endpoint `/auth` devuelve el usuario sin esta protección.
      operationId: clerkivaMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Usuario actual sin campos sensibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: Token inválido o ausente

  # ═══════════════════════════════════════════════════════════════════════════
  # CLERKIVA — Ventas
  # ═══════════════════════════════════════════════════════════════════════════

  /clerkiva/ventas:
    get:
      tags:
        - Clerkiva – Ventas
      summary: Listar ventas (con filtros opcionales)
      description: Roles permitidos — CAJERO, CONSULTA, ADMIN. DEPOSITO recibe 403.
      operationId: clerkivaGetVentas
      security:
        - BearerAuth: []
      parameters:
        - name: desde
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-06-01"
        - name: hasta
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-06-30"
        - name: medioDePago
          in: query
          required: false
          schema:
            type: string
            enum: [efectivo, tarjeta, transferencia]
      responses:
        "200":
          description: Array de ventas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VentaResponse'
        "401":
          description: Token ausente o inválido
        "403":
          description: Rol insuficiente (DEPOSITO)

    post:
      tags:
        - Clerkiva – Ventas
      summary: Registrar venta
      description: |
        Roles permitidos — CAJERO, ADMIN. CONSULTA y DEPOSITO reciben 403.

        El total se calcula automáticamente de `cantidad × precioUnitario` por cada línea.
        En Clerkiva real, si medioDePago es `efectivo`, también crea un movimiento de caja.
      operationId: clerkivaCreateVenta
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVentaRequest'
            example:
              lineasVenta:
                - productoId: 1
                  descripcion: "Yerba Mate 1kg"
                  cantidad: 2
                  precioUnitario: 1500
                - productoId: 2
                  descripcion: "Azúcar 1kg"
                  cantidad: 1
                  precioUnitario: 800
              medioDePago: "efectivo"
      responses:
        "201":
          description: Venta registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VentaResponse'
        "400":
          description: Validación fallida (lineasVenta vacío, medioDePago inválido)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        "403":
          description: Rol insuficiente (CONSULTA, DEPOSITO)

  /clerkiva/ventas/{id}:
    get:
      tags:
        - Clerkiva – Ventas
      summary: Detalle de venta por ID
      operationId: clerkivaGetVentaById
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Venta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VentaResponse'
        "404":
          description: Venta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════════════════════════
  # CLERKIVA — Cajas
  # ═══════════════════════════════════════════════════════════════════════════

  /clerkiva/cajas/apertura:
    post:
      tags:
        - Clerkiva – Cajas
      summary: Abrir sesión de caja
      description: Registra el saldo inicial. Solo puede haber una sesión abierta a la vez.
      operationId: clerkivaAperturaCaja
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AperturaCajaRequest'
      responses:
        "201":
          description: Sesión abierta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SesionCajaResponse'
        "400":
          description: Ya hay una sesión abierta

  /clerkiva/cajas/movimiento:
    post:
      tags:
        - Clerkiva – Cajas
      summary: Registrar movimiento de caja
      description: Ingreso o egreso de efectivo en la sesión activa.
      operationId: clerkivaMovimientoCaja
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMovimientoRequest'
      responses:
        "201":
          description: Movimiento registrado — devuelve la sesión actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SesionCajaResponse'
        "400":
          description: No hay sesión de caja abierta

  /clerkiva/cajas/cierre:
    post:
      tags:
        - Clerkiva – Cajas
      summary: Cerrar sesión de caja
      description: |
        Calcula la diferencia entre el saldo esperado y el contado físicamente.

        `diferencia = saldoFinal - (saldoInicial + ingresos - egresos)`

        Negativo = faltante, positivo = sobrante.
      operationId: clerkivaCierreCaja
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreCajaRequest'
      responses:
        "201":
          description: Sesión cerrada con diferencia calculada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SesionCajaResponse'
        "400":
          description: No hay sesión de caja abierta

  /clerkiva/cajas/sesion-activa:
    get:
      tags:
        - Clerkiva – Cajas
      summary: Ver sesión activa
      operationId: clerkivaGetSesionActiva
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Sesión activa con sus movimientos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SesionCajaResponse'
        "404":
          description: No hay sesión de caja abierta

  # ═══════════════════════════════════════════════════════════════════════════
  # CLERKIVA — Reportes
  # ═══════════════════════════════════════════════════════════════════════════

  /clerkiva/reportes/empleado-top:
    get:
      tags:
        - Clerkiva – Reportes
      summary: Ranking de empleados por ventas (solo ADMIN)
      description: |
        Agrupa ventas por usuario y suma totales — mismo patrón que Clerkiva real
        pero en memoria en vez de `QueryBuilder + groupBy + SUM`.

        Solo ADMIN puede acceder. Cualquier otro rol recibe 403.
      operationId: clerkivaEmpleadoTop
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Ranking de empleados
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmpleadoRankingItem'
        "403":
          description: Solo ADMIN

  /clerkiva/reportes/resumen-diario:
    get:
      tags:
        - Clerkiva – Reportes
      summary: Resumen del día (solo ADMIN)
      description: Total de ventas de hoy, cantidad, desglose por medio de pago.
      operationId: clerkivaResumenDiario
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Resumen del día actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumenDiarioResponse'
        "403":
          description: Solo ADMIN

  # ═══════════════════════════════════════════════════════════════════════════
  # LAB CLERKIVA — Rate Limiting
  # ═══════════════════════════════════════════════════════════════════════════

  /lab-clerkiva/auth/login:
    post:
      tags:
        - Lab Clerkiva – Rate Limiting
      summary: Login con rate limiting (max 5/min)
      description: |
        ## Brute-force protection con @nestjs/throttler

        El login de Clerkiva actual **no tiene límite de intentos**.

        Con `@Throttle({ default: { limit: 5, ttl: 60000 } })`:
        el **6to intento en 60 segundos** recibe automáticamente **429 Too Many Requests**.

        **Probalo:** mandá 6 requests seguidos y observá el cambio de respuesta.
      operationId: labClerkivaLoginSeguro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userID:
                  type: string
                  example: "cualquier_usuario"
                password:
                  type: string
                  example: "cualquier_password"
      responses:
        "401":
          description: Credenciales inválidas (siempre, para probar el throttle)
        "429":
          description: Too Many Requests — 5 intentos superados en 60 segundos

  # ═══════════════════════════════════════════════════════════════════════════
  # LAB CLERKIVA — SSE Tiempo Real
  # ═══════════════════════════════════════════════════════════════════════════

  /lab-clerkiva/caja/eventos:
    get:
      tags:
        - Lab Clerkiva – SSE Tiempo Real
      summary: Stream SSE de ventas en tiempo real
      description: |
        ## Server-Sent Events — sin WebSockets, sin configuración extra

        Abrí esta URL en el browser o con:
        ```
        curl -N http://localhost:3000/lab-clerkiva/caja/eventos
        ```

        Luego hacé un POST a `/lab-clerkiva/caja/venta` y vas a ver el evento
        aparecer instantáneamente.

        **¿Para qué sirve en Clerkiva?**
        - La caja 2 ve en tiempo real las ventas de la caja 1 sin recargar
        - El gerente ve las ventas del día acumularse en vivo en un dashboard
        - Alertas de stock bajo en tiempo real para el depósito

        SSE es HTTP puro: funciona con cualquier proxy/CDN, reconexión automática del browser.
      operationId: labClerkivaEventosSSE
      responses:
        "200":
          description: Stream SSE (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"id\":1,\"usuario\":\"cajero01\",\"total\":5000,\"medioDePago\":\"efectivo\",\"timestamp\":\"2026-06-17T20:00:00.000Z\"}\n\n"

  /lab-clerkiva/caja/venta:
    post:
      tags:
        - Lab Clerkiva – SSE Tiempo Real
      summary: Registrar venta y emitir evento al stream SSE
      description: |
        Registra una venta y la emite a **todos los clientes conectados al stream /eventos**.

        Abrí primero `GET /lab-clerkiva/caja/eventos` en otra pestaña, luego
        mandá un POST acá y verás el evento aparecer instantáneamente.
      operationId: labClerkivaNuevaVenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaVentaRequest'
      responses:
        "201":
          description: Venta registrada y evento emitido al stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/EventoVentaSSE'
                  message:
                    type: string
                    example: "Evento emitido — revisá el stream en GET /lab-clerkiva/caja/eventos"

  # ═══════════════════════════════════════════════════════════════════════════
  # LAB CLERKIVA — Cron Jobs
  # ═══════════════════════════════════════════════════════════════════════════

  /lab-clerkiva/tareas/log:
    get:
      tags:
        - Lab Clerkiva – Cron Jobs
      summary: Log de tareas automáticas ejecutadas
      description: |
        ## @Cron() — tareas automáticas con @nestjs/schedule

        **¿Por qué Clerkiva necesita esto?**

        Actualmente en Clerkiva:
        - El resumen de ventas se genera manualmente cuando el gerente lo recuerda
        - Nadie sabe si hay productos bajo stock hasta que el cajero lo nota
        - No hay backups automáticos

        **Con @Cron():**
        - `@Cron('59 23 * * *')` → resumen automático a las 23:59, email al gerente
        - `@Cron('0 * * * *')` → chequeo de stock cada hora
        - `@Cron(CronExpression.EVERY_DAY_AT_6AM)` → backup diario

        En este lab los crons corren cada 30 segundos y 2 minutos para que puedas
        verlos en acción. Esperá unos segundos y refrescá este endpoint.
      operationId: labClerkivaTareasLog
      responses:
        "200":
          description: Últimas 30 ejecuciones de cron jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LogEntryResponse'
                  nota:
                    type: string
                    example: "Chequeo stock: cada 30s (en prod: cada hora). Resumen diario: cada 2min (en prod: 23:59)."

  # ═══════════════════════════════════════════════════════════════════════════
  # LAB CLERKIVA — Health Check
  # ═══════════════════════════════════════════════════════════════════════════

  /lab-clerkiva/salud:
    get:
      tags:
        - Lab Clerkiva – Health Check
      summary: Health check del servidor
      description: |
        ## ¿Por qué Clerkiva necesita esto urgente?

        Actualmente no hay forma de saber si el servidor está caído sin que alguien
        lo reporte. El primer síntoma es "no funciona la caja" a las 8am.

        **Con este endpoint:**
        - UptimeRobot (gratis) lo consulta cada 5 minutos y manda WhatsApp/email si cae
        - Railway/Render lo usa como liveness probe para reinicios automáticos
        - El frontend puede mostrar un badge de estado en tiempo real

        **Versión avanzada:** `@nestjs/terminus` agrega checks de DB, Redis, disco, memoria.
      operationId: labClerkivaSalud
      responses:
        "200":
          description: Servidor funcionando
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaludResponse'

